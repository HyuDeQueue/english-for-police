services:
  fe:
    image: huyhoang204205/policefe:latest
    pull_policy: always
    container_name: police-fe
    restart: unless-stopped
    env_file:
      - ./.env-fe
    ports:
      - "3007:80"
    depends_on:
      be:
        condition: service_started
    networks:
      - police-net

  be:
    image: huyhoang204205/policebe:latest
    pull_policy: always
    container_name: police-be
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "1600:1600"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - police-net

  db:
    image: postgres:16-alpine
    container_name: police-db
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - police_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - police-net

volumes:
  police_postgres_data:
    name: police_postgres_data

networks:
  police-net:
    name: police-net